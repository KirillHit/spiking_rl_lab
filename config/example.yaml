rl_params:
  mode: evaluate # train, optimize, evaluate
  seed: 42
  experiment_name: test
  checkpoint_path: experiments/models/example_ant/model.zip
  device: cuda

  env:
    id: Ant-v5
    n_envs: 1
    render_mode: human
    normalization:
      enable: True
      vecnorm_path: experiments/models/example_ant/vecnorm.pkl
      norm_obs: True
      norm_reward: True
      params:
        clip_obs: 10


  algorithm:
    name: ppo
    params:
      learning_rate: 3e-4
      n_steps: 2048
      batch_size: 256
      n_epochs: 4
      ent_coef: 0.01

  policy:
    name: mlp
    params:
      net_arch: [256, 256]

  optuna:
    n_trials: 50
    parameters:
      - parameter: "algorithm.params.learning_rate"
        type: "float"
        low: 1e-5
        high: 1e-2
        log: true
      - parameter: "policy.params.net_arch"
        type: "categorical"
        choices: [[64, 64], [128, 128], [256, 256]]

  training:
    total_timesteps: 2000000
    n_eval_episodes: 20

  logging:
    folder: logs